# 서울시 인허가(가게 뼈대) 수집 — 월 1회 자동 + 수동 실행.
#
# goodprice와 같은 이유로 GitHub Actions에서 돈다(수 분짜리 배치). 폐업/재개는 바로
# 덮어쓰지 않고 관리자 확인 후보로 쌓인다. goodprice와 하루 엇갈리게 잡아 DB 부하가 겹치지 않게 한다.
#
# 필요 시크릿 (Repo → Settings → Secrets and variables → Actions):
#   DATABASE_URL_DIRECT : Supabase 직접 연결(5432, 풀러 아님).
#   SEOUL_API_KEY       : 서울 열린데이터광장 인증키.
name: ingest-seoul

on:
  schedule:
    - cron: '0 18 2 * *' # 매월 2일 18:00 UTC = 3일 03:00 KST (goodprice와 하루 엇갈림). 조절 가능.
  workflow_dispatch: {}

concurrency:
  group: ingest-seoul
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: migrate
        run: npm run migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DIRECT }}
      - name: ingest seoul
        run: npm run ingest:seoul
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DIRECT }}
          SEOUL_API_KEY: ${{ secrets.SEOUL_API_KEY }}
